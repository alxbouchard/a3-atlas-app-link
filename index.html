<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PAZ — Apps</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f7;
         display: flex; align-items: center; justify-content: center; min-height: 90vh; margin: 0; }
  .card { background: #fff; border-radius: 20px; padding: 36px 28px; max-width: 400px;
          text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
  h1 { font-size: 24px; margin: 0 0 6px; }
  p { color: #555; font-size: 15px; }
  a.app { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #111;
          background: #f0f4ff; border-radius: 14px; padding: 14px 16px; margin-top: 14px; }
  a.app .emoji { font-size: 28px; }
  a.app .name { font-weight: 600; }
  a.app .desc { color: #666; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <h1>PAZ</h1>
  <p>Les apps de l'équipe PAZ.</p>
  <a class="app" href="/atlas/">
    <span class="emoji">🏠</span>
    <span>
      <span class="name">Atlas Scanner</span><br>
      <span class="desc">Scan 3D, plans et photos — la mémoire du bâtiment.</span>
    </span>
  </a>
</div>
</body>
</html>
